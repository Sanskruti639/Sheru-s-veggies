<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="button2.css">
</head>
<body>
    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Cart</title>
  <link rel="stylesheet" href="submit.css">
</head>
<body>

  <div class="cart-page">
    <h1>Your Cart Items</h1>
    <div id="cart-items-list"></div>
    <div class="cart-total" id="cart-total">Total: ₹0</div>
    <button onclick="submitOrder()">Submit Order</button>
    <button onclick="goBack()">Back to Shop</button>
 </div>

  <script>
    let cartItems = JSON.parse(localStorage.getItem("cart")) || [];
    let cartTotal = 0;

    function renderCartPage() {
      const container = document.getElementById("cart-items-list");
      container.innerHTML = "";
      cartTotal = 0;

      if (cartItems.length === 0) {
        container.innerHTML = "<p>Your cart is empty.</p>";
        document.getElementById("cart-total").textContent = "Total: ₹0";
        return;
      }

      cartItems.forEach((item) => {
        const div = document.createElement("div");
        div.className = "cart-item";
        div.textContent = `${item.productName} - ${item.quantity} KG = ₹${item.totalPrice}`;
        container.appendChild(div);
        cartTotal += item.totalPrice;
      });

      document.getElementById("cart-total").textContent = `Total: ₹${cartTotal}`;
    }

    function submitOrder() {
      if (cartItems.length === 0) {
        alert("Your cart is empty!");
        return;
      }

      alert(`Order submitted! Total amount: ₹${cartTotal}`);
      localStorage.removeItem("cart");
      location.href = "index.html"; // return to shop after order
    }

    function goBack() {
      location.href = "index.html";
    }

    window.onload = renderCartPage;
  </script>

</body>
</html>

</body>
</html>
