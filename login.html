<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Veggie Login</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="bg-overlay">
    <div class="login-box">
      <div class="logo">🥦 Veggie Fresh</div>
      <h2>Login</h2>
      <p>Access your fresh produce dashboard</p>
      <form>
        <input type="email" placeholder="Email" required />
        <input type="password" placeholder="Password" required />
        <button type="submit" onclick="yes()">Login</button>
        <div class="extra">
          <a href="#">Forgot Password?</a>
        </div>
      </form>
      <div class="signup">
        Don't have an account? <a href="#">Sign up</a>
      </div>
    </div>
  </div>
</body>

<script>
  function yes(){
    alert("You have been successfully login to this portal")
  }
</script>





</html>
